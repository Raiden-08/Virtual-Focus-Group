model:
  d_in: 1               # feature dim per node (univariate)
  lstm_hidden: 64       # MUST equal rag.vector_dim and gnn_out_dim
  gnn_out_dim: 64       # FAISS vector store dimension
  gnn_heads: 4          # GAT attention heads
  lstm_layers: 2
  dropout: 0.1
  window_size: 30
  num_nodes: 35         # 35 for SMAP | 51 for SWAT | 55 for MSL

rag:
  vector_dim: 64        # MUST equal model.lstm_hidden and model.gnn_out_dim
  alpha_1: 0.33         # H_temp weight
  alpha_2: 0.33         # H_struct weight
  alpha_3: 0.34         # H_RAG weight
  k_neighbors: 10       # FAISS retrieval k for H_RAG
  gamma: 0.5            # depth vs centrality balance in H_struct

curriculum:
  enabled: true
  k_warmup: 30          # epochs over which curriculum fully opens
  k_rescore: 10         # re-run hardness scoring every N epochs
  alpha_1: 0.33
  alpha_2: 0.33
  alpha_3: 0.34
  gamma: 0.5

training:
  epochs: 100
  batch_size: 64
  lr: 0.001
  weight_decay: 1.0e-5
  device: cuda
  grad_clip: 1.0
  checkpoint_dir: checkpoints/
  seed: 42

data:
  dataset: smap                  # active dataset: smap | swat | msl
  data_dir: data/raw/smap        # used by load_smap / load_msl
  val_split: 0.1                 # fraction of train used for validation
  stride: 1
  swat_dir: data/raw
  smap_dir: data/raw/smap
  msl_dir: data/raw/smap

logging:
  wandb_project: rc-tgad
  use_wandb: false
  run_name: rctgad
  log_interval: 10